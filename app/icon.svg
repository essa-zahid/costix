<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#10847A"/>
      <stop offset="100%" stop-color="#0A5E57"/>
    </linearGradient>
  </defs>
  <!-- Background — slightly more rounded at favicon scale -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <!-- Top arm -->
  <rect x="5" y="5" width="19.5" height="4.5" rx="2.25" fill="white"/>
  <!-- Upper spine -->
  <rect x="5" y="11.5" width="7.5" height="4.5" rx="2.25" fill="white" fill-opacity="0.55"/>
  <!-- Lower spine -->
  <rect x="5" y="18" width="7.5" height="4.5" rx="2.25" fill="white" fill-opacity="0.75"/>
  <!-- Bottom arm -->
  <rect x="5" y="23.5" width="19.5" height="4.5" rx="2.25" fill="white"/>
</svg>
